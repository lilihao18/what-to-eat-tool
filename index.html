<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今天吃什么</title>
  <meta name="description" content="一个帮助你在饭点快速决定吃什么的轻量工具网站。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="hero card">
      <p class="eyebrow">Eat Smart, Decide Fast</p>
      <h1>今天吃什么</h1>
      <p class="subtitle">帮你快速做决定</p>

      <div class="decision-panel">
        <div class="result-label">今天推荐你吃</div>
        <div id="result" class="result-text">点击下方按钮开始抽取</div>
        <div id="resultHint" class="result-hint">菜单会保存在当前浏览器，下次打开还在。</div>
      </div>

      <div class="decision-actions">
        <button id="pickButton" class="button button-primary">帮我决定</button>
        <button id="repickButton" class="button button-secondary" type="button">再抽一次</button>
      </div>
    </section>

    <section class="controls-grid">
      <section class="card">
        <div class="section-head">
          <h2>添加想吃的</h2>
          <p>把你常吃或想吃的食物加进来</p>
        </div>

        <form id="foodForm" class="add-form">
          <label class="sr-only" for="foodInput">输入食物名称</label>
          <input
            id="foodInput"
            type="text"
            name="food"
            maxlength="20"
            placeholder="例如：鸡公煲、寿司、米线"
            autocomplete="off"
          >
          <button class="button button-primary" type="submit">添加</button>
        </form>

        <div id="formMessage" class="form-message" aria-live="polite"></div>
      </section>

      <section class="card">
        <div class="section-head section-head-row">
          <div>
            <h2>历史记录</h2>
            <p>最近 5 次抽中的结果</p>
          </div>
          <button id="clearHistoryButton" class="button button-ghost" type="button">清空历史</button>
        </div>

        <ul id="historyList" class="history-list"></ul>
        <p id="historyEmpty" class="empty-text">还没有抽取记录，先试试“帮我决定”。</p>
      </section>
    </section>

    <section class="card">
      <div class="section-head section-head-row">
        <div>
          <h2>当前菜单</h2>
          <p>可临时跳过不想吃的食物，不会真的删除菜单</p>
        </div>
        <div class="menu-actions">
          <button id="clearExcludedButton" class="button button-ghost" type="button">清空跳过</button>
          <button id="clearMenuButton" class="button button-danger" type="button">清空菜单</button>
        </div>
      </div>

      <ul id="foodList" class="food-list"></ul>
      <p id="menuEmpty" class="empty-text">菜单为空，先添加几样你想吃的吧。</p>
      <p id="excludedHint" class="empty-text">已跳过的食物本轮不会参与抽取。</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
